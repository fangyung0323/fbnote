name: Daily Post

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: '選擇文章類別（自動/植物/永續/碳盤查/生活）'
        required: false
        type: string
        default: ''
      ai_role:
        description: 'AI 角色（例如：植物學科普作家）'
        required: false
        type: string
        default: ''
      writing_style:
        description: '寫作風格（例如：輕鬆活潑，像朋友聊天）'
        required: false
        type: string
        default: ''
      article_structure:
        description: '文章結構（例如：開門見山：開頭直接點出主題和觀點）'
        required: false
        type: string
        default: ''
      plant_topic:
        description: '植物主題（留空則隨機）'
        required: false
        type: string
        default: ''
      sustain_topic:
        description: '永續主題（留空則隨機）'
        required: false
        type: string
        default: ''
      carbon_topic:
        description: '碳盤查主題（留空則隨機）'
        required: false
        type: string
        default: ''
      life_topic:
        description: '生活主題（留空則隨機）'
        required: false
        type: string
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安裝依賴
        run: pip install -r requirements.txt
      
      - name: 執行發文機器人
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.TARGET_USERNAME }}
          WEBSITE_REPO_NAME: ${{ secrets.TARGET_REPO_NAME }}
          MANUAL_CATEGORY: ${{ github.event.inputs.category }}
          AI_ROLE: ${{ github.event.inputs.ai_role }}
          WRITING_STYLE: ${{ github.event.inputs.writing_style }}
          ARTICLE_STRUCTURE: ${{ github.event.inputs.article_structure }}
          PLANT_TOPIC: ${{ github.event.inputs.plant_topic }}
          SUSTAIN_TOPIC: ${{ github.event.inputs.sustain_topic }}
          CARBON_TOPIC: ${{ github.event.inputs.carbon_topic }}
          LIFE_TOPIC: ${{ github.event.inputs.life_topic }}
        run: python scripts/main.py
      
      - name: 等待網站部署
        run: sleep 60
      
      - name: 寄送摘要給訂閱者
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/daily_digest.py
