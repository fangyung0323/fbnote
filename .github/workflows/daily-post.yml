name: Daily Post

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: '選擇文章類別'
        required: false
        type: choice
        options:
          - 自動（依日期輪換）
          - 植物
          - 永續
          - 碳盤查
          - 生活
        default: '自動（依日期輪換）'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安裝依賴
        run: pip install requests
      
      - name: 執行文件機器人
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.TARGET_USERNAME }}
          WEBSITE_REPO_NAME: ${{ secrets.TARGET_REPO_NAME }}
          MANUAL_CATEGORY: ${{ github.event.inputs.category }}
        run: python scripts/main.py
