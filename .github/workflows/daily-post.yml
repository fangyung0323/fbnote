name: Daily Post Debug

on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 调试 - 检查环境变量
        run: |
          echo "=== 环境变量检查 ==="
          echo "GITHUB_USERNAME: ${{ secrets.TARGET_USERNAME }}"
          echo "WEBSITE_REPO_NAME: ${{ secrets.TARGET_REPO_NAME }}"
          echo "GH_TOKEN 前5位: ${{ secrets.GH_TOKEN }}"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      
      - name: 调试 - 测试 Git 权限
        run: |
          git ls-remote https://${{ secrets.TARGET_USERNAME }}:${{ secrets.GH_TOKEN }}@github.com/${{ secrets.TARGET_USERNAME }}/${{ secrets.TARGET_REPO_NAME }}.git
      
      - name: 执行文件机器人
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.TARGET_USERNAME }}
          WEBSITE_REPO_NAME: ${{ secrets.TARGET_REPO_NAME }}
        run: |
          echo "=== 开始执行脚本 ==="
          python scripts/main.py
          echo "=== 脚本执行完毕 ==="
