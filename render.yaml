# render.yaml (放在 fbnote 倉庫)
services:
  # 定時發文機器人
  - type: cron
    name: jueji-daily-post
    runtime: python
    repo: https://github.com/fangyung0323/fbnote
    branch: main
    schedule: "0 9 * * *"              # 每天 UTC 9:00 (台北 17:00)
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/main.py
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USERNAME
        value: isa930323-jpg
      - key: WEBSITE_REPO_NAME
        value: fb                       # 你的網站倉庫名稱
